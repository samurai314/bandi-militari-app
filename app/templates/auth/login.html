{% extends "base.html" %}
{% block title %}Accedi{% endblock %}
{% block content %}
<div style="max-width:420px;margin:2rem auto 0;">
  <div style="text-align:center;margin-bottom:1.5rem;">
    <div style="font-size:2.2rem;">🎖️</div>
    <h2 style="margin:0.3rem 0 0;">Bentornato</h2>
  </div>

  <div class="card">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email</label>
      <input type="email" name="email" required autofocus placeholder="nome@esempio.it">
      <label>Password</label>
      <input type="password" name="password" required>
      <button class="btn" type="submit" style="margin-top:0.4rem;">Accedi →</button>
    </form>
  </div>

  <p style="text-align:center;margin-top:1.2rem;font-size:0.9rem;color:var(--testo-attenuato);">
    Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati</a><br>
    <a href="{{ url_for('auth.recupero') }}" style="font-size:0.85rem;">Password dimenticata?</a>
  </p>
</div>
{% endblock %}
