{% extends "base.html" %}
{% block title %}Registrati{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:0 auto;">
  <h2>Crea il tuo account</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <label>Password (min. 6 caratteri)</label>
    <input type="password" name="password" required minlength="6">
    <button class="btn" type="submit">Registrati</button>
  </form>
  <p style="margin-top:1rem;font-size:0.9rem;">Hai già un account? <a href="{{ url_for('auth.login') }}">Accedi</a></p>
</div>
{% endblock %}
