{% extends "base.html" %}
{% block title %}Teoria - {{ materia }}{% endblock %}
{% block content %}
<div class="card">
  <p><a href="{{ url_for('teoria.indice') }}">← Tutte le materie</a></p>
  <h2>{{ materia }}</h2>
</div>

{% for p in pillole %}
  <div class="card">
    <h3>{{ p.titolo }}</h3>
    <p style="font-size:0.92rem;">{{ p.testo }}</p>
  </div>
{% endfor %}

<div class="card" style="text-align:center;">
  <a class="btn" href="{{ url_for('quiz.avvia', mode='practice', materia=materia) }}">Mettiti alla prova su {{ materia }}</a>
</div>
{% endblock %}
